name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - name: Prepare artifact
        run: |
          rm -rf out || true
          mkdir out
          # Copy only top-level files and directories (exclude .git and workflow artifacts)
          rsync -av --exclude='.git' --exclude='.github' ./ out/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: out
      - name: Deploy to Pages
        uses: actions/deploy-pages@v1
